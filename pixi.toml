[workspace]
channels = ["conda-forge"]
name = "SNI-SLAM-Better"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install-tcnn = { cmd = "TCNN_CUDA_ARCHITECTURES=89 LD_LIBRARY_PATH=$CONDA_PREFIX/targets/x86_64-linux/lib:$LD_LIBRARY_PATH python -m pip install git+https://github.com/NVlabs/tiny-cuda-nn/#subdirectory=bindings/torch --no-build-isolation" }
run = { cmd = "python run.py" }

[system-requirements]
cuda = "12.2"

[dependencies]
pytorch-gpu = ">=2.10.0,<3"
torchaudio = ">=2.10.0,<3"
torchvision = ">=0.25.0,<0.26"
wandb = ">=0.25.1,<0.26"
gdown = ">=5.2.1,<6"
pytorch3d = ">=0.7.9,<0.8"
opencv = ">=4.13.0,<5"
matplotlib = ">=3.10.8,<4"
trimesh = ">=4.11.5,<5"
open3d = ">=0.19.0,<0.20"
scikit-image = ">=0.26.0,<0.27"
rtree = ">=1.4.1,<2"
pip = "*"
setuptools = "<70"   # pkg_resources was removed in setuptools 70; tcnn build needs it
wheel = "*"
ninja = "*"
gcc = "13.*"
gxx = "13.*"
cuda-nvcc = "12.9.*"
cuda-cudart-dev = "12.9.*"
cuda-nvrtc-dev = "12.9.*"
libcublas-dev = "*"
libcusolver-dev = "*"
libcusparse-dev = "*"
libcurand-dev = "*"
